version: "3.9"

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: market_data
  POSTGRES_USER: market_user
  POSTGRES_PASSWORD: market_pass
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: market-data
  MINIO_SECURE: "false"
  PIPELINE_CONFIG_PATH: /app/config/pipeline.yml
  LOG_LEVEL: INFO

services:

  # ── Postgres ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: market_data
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d   # runs SQL scripts on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d market_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/market-data &&
        echo 'Bucket created'
      "

  # ── Dagster webserver ─────────────────────────────────────────────────────
  dagster-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /app/workspace.yaml
    environment:
      <<: *common-env
      DAGSTER_HOME: /opt/dagster/dagster_home
    ports:
      - "3000:3000"
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Dagster daemon (runs schedules and sensors) ───────────────────────────
  dagster-daemon:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: dagster-daemon run -w /app/workspace.yaml
    environment:
      <<: *common-env
      DAGSTER_HOME: /opt/dagster/dagster_home
    volumes:
      - dagster_home:/opt/dagster/dagster_home
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── FastAPI serving layer ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  dagster_home:
